name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server (go vet, race tests, wasm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -count=1 ./...
      - name: WASM compile check
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/tablewasm

  client:
    name: client (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:run
      # public/tablecore.wasm is committed, so the client build needs no Go.
      - name: Build
        run: npm run build
